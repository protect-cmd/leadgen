<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grant Ellis Group Lead Queue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #08090d;
      --surface: #0d0f16;
      --surface-2: #111520;
      --border: #1a2030;
      --border-2: #242d40;
      --amber: #c8861e;
      --amber-bright: #e09624;
      --amber-dim: #7a5210;
      --text: #bfbbb0;
      --text-bright: #dcd8cc;
      --text-dim: #424d62;
      --green: #3a8f5e;
      --green-dim: #1e3d2b;
      --red: #8f3a3a;
      --red-dim: #3d1e1e;
      --blue: #3a6b8f;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── LAYOUT ── */
    .dashboard-top {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: var(--amber);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-bright);
    }

    .header-title span {
      color: var(--amber);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .btn-refresh {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border-2);
      padding: 5px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-refresh:hover {
      color: var(--text-bright);
      border-color: var(--text-dim);
    }

    /* ── METRICS STRIP ── */
    .metrics-strip {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      overflow-x: auto;
    }

    .metric {
      padding: 12px 24px;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      min-width: 110px;
    }

    .metric-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--amber-bright);
      line-height: 1;
      margin-bottom: 3px;
    }

    .metric-value.neutral {
      color: var(--text-bright);
    }

    .metric-value.dim {
      color: var(--text-dim);
    }

    .metric-value.green {
      color: var(--green);
    }

    .metric-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .metrics-run-time {
      padding: 12px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-left: auto;
    }

    .metrics-run-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .metrics-run-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      margin-top: 2px;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      min-height: 48px;
    }

    .toolbar-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .filter-input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-bright);
      padding: 5px 10px;
      outline: none;
      width: 200px;
      transition: border-color 0.15s;
    }

    .filter-input:focus {
      border-color: var(--border-2);
    }

    .filter-input::placeholder {
      color: var(--text-dim);
    }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border-2);
      flex-shrink: 0;
    }

    /* filter chips */
    .chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border: 1px solid var(--border-2);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .chip:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    .chip.active {
      background: var(--amber-dim);
      border-color: var(--amber);
      color: var(--amber-bright);
    }

    .chip.active-green {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }

    .chip.active-red {
      background: var(--red-dim);
      border-color: var(--red);
      color: #c05050;
    }

    .chip.active-blue {
      background: #1a2d3a;
      border-color: #3a6b8f;
      color: #4a9bbf;
    }

    .queue-count {
      margin-left: auto;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .queue-count strong {
      color: var(--amber-bright);
      font-size: 16px;
    }

    /* ── BULK ACTION BAR ── */
    .bulk-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 8px 24px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--amber-dim);
      animation: slide-in 0.15s ease;
    }

    .bulk-bar.visible {
      display: flex;
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bulk-count {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--amber);
    }

    .btn-bulk {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      padding: 5px 16px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-bulk-approve {
      background: var(--amber);
      color: #0a0804;
    }

    .btn-bulk-approve:hover {
      background: var(--amber-bright);
    }

    .btn-bulk-skip {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border-2);
    }

    .btn-bulk-skip:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    .btn-bulk:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .bulk-bar-deselect {
      margin-left: auto;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
    }

    .bulk-bar-deselect:hover {
      color: var(--text);
    }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      padding: 0 0 80px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1100px;
      table-layout: fixed;
    }

    thead th {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }

    thead th:last-child {
      border-right: none;
    }

    thead th.sortable {
      cursor: pointer;
    }

    thead th.sortable:hover {
      color: var(--text);
      background: var(--surface-2);
    }

    thead th.sort-asc::after {
      content: ' ↑';
      color: var(--amber);
    }

    thead th.sort-desc::after {
      content: ' ↓';
      color: var(--amber);
    }

    /* column widths */
    th.col-check {
      width: 50px;
      text-align: center;
      padding: 0;
    }

    th.col-case {
      width: 110px;
    }

    th.col-tenant {
      width: 180px;
    }

    th.col-landlord {
      width: 180px;
    }

    th.col-address {
      width: auto;
    }

    th.col-phone {
      width: 135px;
    }

    th.col-dnc {
      width: 100px;
    }

    th.col-type {
      width: 150px;
    }

    th.col-date {
      width: 130px;
    }

    th.col-action {
      width: 150px;
      text-align: right;
    }

    tbody tr {
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: var(--surface-2);
    }

    tbody tr.selected {
      background: #151a27;
    }

    tbody td {
      padding: 13px 16px;
      vertical-align: middle;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border-2);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody td:last-child {
      border-right: none;
    }

    tbody td:first-child {
      text-align: center;
      padding: 0;
    }

    /* focused row for keyboard nav */
    tbody tr.kb-focus {
      outline: 1px solid var(--amber-dim);
      outline-offset: -1px;
    }

    /* checkbox */
    .row-check {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--amber);
      border: 1px solid var(--border-2);
      background: var(--surface);
    }

    .td-case {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--amber);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .td-name {
      font-size: 14px;
      color: var(--text-bright);
      font-weight: 500;
    }

    .td-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    .td-address {
      font-size: 12px;
      color: var(--text);
      max-width: 220px;
      line-height: 1.4;
    }

    .td-phone {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      white-space: nowrap;
    }

    .td-phone.has-phone {
      color: var(--text-bright);
    }

    .td-phone.no-phone {
      color: var(--text-dim);
    }

    .badge {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 2px;
    }

    .badge-residential {
      background: var(--green-dim);
      color: var(--green);
    }

    .badge-commercial {
      background: var(--blue);
      color: #7abce0;
    }

    .badge-unknown {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border-2);
    }

    .badge-blocked {
      background: var(--red-dim);
      color: #c05050;
      border: 1px solid var(--red);
    }

    .td-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
    }

    .td-date.overdue {
      color: #c05050;
    }

    /* ── ACTION BUTTONS ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      justify-content: center;
      align-items: stretch;
      width: 100%;
      max-width: 130px;
      margin-left: auto;
    }

    .btn-approve,
    .btn-skip,
    .btn-dnc {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      padding: 6px 18px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      width: 100%;
      text-align: center;
    }

    .btn-approve {
      background: var(--amber);
      color: #0a0804;
    }

    .btn-approve:hover {
      background: var(--amber-bright);
    }

    .btn-approve:active {
      transform: scale(0.97);
    }

    .btn-dnc {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green);
    }

    .btn-dnc:hover {
      background: var(--green);
      color: #07110c;
    }

    .btn-skip {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border-2);
    }

    .btn-skip:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    .btn-approve:disabled,
    .btn-skip:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .action-status {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      display: block;
      text-align: center;
      white-space: nowrap;
    }

    .action-status.triggered {
      color: var(--green);
    }

    .action-status.skipped {
      color: var(--text-dim);
    }

    .action-status.error {
      color: #c05050;
    }

    /* ── EMPTY / LOADING ── */
    .state-full {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 12px;
      color: var(--text-dim);
    }

    .state-icon {
      font-size: 36px;
      line-height: 1;
    }

    .state-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .state-sub {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── SPINNER ── */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-2);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── TOAST ── */
    .toast-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }

    .toast {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 10px 18px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-left: 3px solid var(--amber);
      color: var(--text-bright);
      animation: toast-in 0.2s ease;
    }

    .toast.error {
      border-left-color: #c05050;
    }

    .toast.success {
      border-left-color: var(--green);
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateX(12px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-2);
    }

    /* ── KEYBOARD HINT ── */
    .kb-hint {
      position: fixed;
      bottom: 24px;
      left: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 12px;
    }

    .kb-hint kbd {
      background: var(--surface);
      border: 1px solid var(--border-2);
      padding: 1px 5px;
      border-radius: 2px;
      color: var(--text-dim);
    }
  </style>
</head>

<body>

  <!-- STICKY TOP SECTION -->
  <div class="dashboard-top">
    <!-- HEADER -->
    <header class="header">
      <div class="header-brand">
        <div class="header-logo"></div>
        <div class="header-title"><span>GEG</span> · LEAD QUEUE</div>
      </div>
      <div class="header-right">
        <div class="header-clock" id="clock">--:--:--</div>
        <button class="btn-refresh" onclick="loadAll()">↻ REFRESH</button>
      </div>
    </header>

    <!-- METRICS STRIP -->
    <div class="metrics-strip" id="metrics-strip">
      <div class="metric">
        <div class="metric-value neutral" id="m-pending">—</div>
        <div class="metric-label">Pending</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="m-received">—</div>
        <div class="metric-label">Last Scraped</div>
      </div>
      <div class="metric">
        <div class="metric-value dim" id="m-dupes">—</div>
        <div class="metric-label">Dupes Skipped</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="m-batchdata">—</div>
        <div class="metric-label">BatchData Calls</div>
      </div>
      <div class="metric">
        <div class="metric-value green" id="m-phones">—</div>
        <div class="metric-label">Phones Found</div>
      </div>
      <div class="metric">
        <div class="metric-value dim" id="m-addr-skip">—</div>
        <div class="metric-label">Addr Skipped</div>
      </div>
      <div class="metrics-run-time">
        <div class="metrics-run-label">Last Run</div>
        <div class="metrics-run-value" id="m-run-time">—</div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <span class="toolbar-label">Brand</span>
      <button class="chip active" id="brand-ec" onclick="setBrand('ec')">GRANT</button>
      <button class="chip" id="brand-ng" onclick="setBrand('ng')">VANTAGE</button>
      <div class="toolbar-sep"></div>
      <span class="toolbar-label">View</span>
      <button class="chip active" id="view-ec_residential" onclick="setView('ec_residential')">Residential</button>
      <button class="chip" id="view-ec_commercial" onclick="setView('ec_commercial')">Commercial</button>
      <button class="chip" id="view-ec_held" onclick="setView('ec_held')">Held</button>
      <button class="chip" id="view-ec_discarded" onclick="setView('ec_discarded')">Discarded</button>
      <div class="toolbar-sep"></div>
      <span class="toolbar-label">Filter</span>
      <input class="filter-input" id="filter-input" type="text" placeholder="case, name, address…"
        oninput="applyFilters()">
      <div class="toolbar-sep"></div>
      <button class="chip" id="chip-phone" onclick="toggleChip('phone')">Has Phone</button>
      <button class="chip" id="chip-dnc" onclick="toggleChip('dnc')">DNC Clear</button>
      <button class="chip" id="chip-residential" onclick="toggleChip('residential')">Residential</button>
      <button class="chip" id="chip-commercial" onclick="toggleChip('commercial')">Commercial</button>
      <button class="chip" id="chip-overdue" onclick="toggleChip('overdue')">Overdue</button>
      <div class="queue-count" id="queue-count"></div>
    </div>

    <!-- BULK ACTION BAR -->
    <div class="bulk-bar" id="bulk-bar">
      <span class="bulk-count" id="bulk-count">0 selected</span>
      <button class="btn-bulk btn-bulk-approve" id="btn-bulk-approve" onclick="bulkApprove()">Approve Selected</button>
      <button class="btn-bulk btn-bulk-skip" onclick="bulkSkip()">Skip Selected</button>
      <button class="bulk-bar-deselect" onclick="clearSelection()">✕ Deselect All</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table id="leads-table">
      <thead>
        <tr>
          <th class="col-check"><input type="checkbox" class="row-check" id="check-all"
              onchange="toggleAll(this.checked)" title="Select all visible"></th>
          <th class="col-case">Case #</th>
          <th class="col-tenant">Tenant</th>
          <th class="col-landlord">Landlord</th>
          <th class="col-address">Address</th>
          <th class="col-phone">Phone</th>
          <th class="col-dnc">DNC</th>
          <th class="col-type">Type</th>
          <th class="col-date sortable" id="th-court" onclick="setSort('court_date')">Court Date</th>
          <th class="col-date sortable" id="th-filing" onclick="setSort('filing_date')">Filed</th>
          <th class="col-action">Action</th>
        </tr>
      </thead>
      <tbody id="leads-body">
        <tr>
          <td colspan="11">
            <div class="state-full">
              <div class="spinner"></div>
              <div class="state-sub">Loading leads...</div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- KEYBOARD HINT -->
  <div class="kb-hint">
    <span><kbd>j</kbd>/<kbd>k</kbd> navigate</span>
    <span><kbd>a</kbd> approve</span>
    <span><kbd>s</kbd> skip</span>
    <span><kbd>space</kbd> select</span>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-wrap" id="toast-wrap"></div>

  <script>
    // ── CLOCK ──
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-US', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── STATE ──
    let allLeads = [];
    let visibleLeads = [];
    let selectedCases = new Set();
    let sortKey = null;
    let sortDir = 1; // 1 = asc, -1 = desc
    let chips = { phone: false, dnc: false, residential: false, commercial: false, overdue: false };
    let kbIndex = -1;
    let activeBrand = 'ec';
    let activeView = 'ec_residential';
    let lastRunAt = null;

    const brandViews = {
      ec: ['ec_residential', 'ec_commercial', 'ec_held', 'ec_discarded'],
      ng: ['ng_residential', 'ng_commercial', 'ng_spanish_residential', 'ng_spanish_commercial', 'ng_held', 'ng_discarded'],
    };

    const viewLabels = {
      ec_residential: 'English Residential Approved',
      ec_commercial: 'Commercial High Priority',
      ec_held: 'Held',
      ec_discarded: 'Discarded',
      ng_residential: 'Vantage Residential',
      ng_commercial: 'Vantage Commercial',
      ng_spanish_residential: 'Spanish Residential Approved',
      ng_spanish_commercial: 'Spanish Commercial',
      ng_held: 'Held',
      ng_discarded: 'Discarded',
    };

    // ── LOAD ──
    async function loadAll() {
      await Promise.all([loadMetrics(), loadLeadCounts(), loadLeads()]);
    }

    async function loadLeadCounts() {
      try {
        const res = await fetch('/api/lead-counts');
        const counts = await res.json();
        brandViews[activeBrand].forEach(viewKey => {
          const el = document.getElementById(`view-${viewKey}`);
          if (el) {
            const shortLabels = {
              ec_residential: 'Residential', ec_commercial: 'Commercial',
              ec_held: 'Held', ec_discarded: 'Discarded',
              ng_residential: 'Residential', ng_commercial: 'Commercial',
              ng_spanish_residential: 'Spanish Res', ng_spanish_commercial: 'Spanish Com',
              ng_held: 'Held', ng_discarded: 'Discarded',
            };
            el.textContent = `${shortLabels[viewKey]} (${counts[viewKey] ?? 0})`;
          }
        });
      } catch (e) { console.error('lead counts error', e); }
    }

    async function loadMetrics() {
      try {
        const res = await fetch('/api/metrics');
        const rows = await res.json();
        if (!rows.length) return;
        const m = rows[0];
        document.getElementById('m-received').textContent = m.filings_received ?? '—';
        document.getElementById('m-dupes').textContent = m.duplicates_skipped ?? '—';
        document.getElementById('m-batchdata').textContent = m.batchdata_calls ?? '—';
        document.getElementById('m-phones').textContent = m.phones_found ?? '—';
        document.getElementById('m-addr-skip').textContent = m.address_skipped ?? '—';
        document.getElementById('m-run-time').textContent = m.run_at
          ? new Date(m.run_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true })
          : '—';
      } catch (e) { console.error('metrics error', e); }
    }

    async function loadLeads() {
      const tbody = document.getElementById('leads-body');
      tbody.innerHTML = `<tr><td colspan="11"><div class="state-full"><div class="spinner"></div><div class="state-sub">Loading...</div></div></td></tr>`;
      try {
        const res = await fetch(`/api/leads?view=${encodeURIComponent(activeView)}`);
        allLeads = await res.json();
        selectedCases.clear();
        kbIndex = -1;
        applyFilters();
        document.getElementById('m-pending').textContent = allLeads.length;
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="11"><div class="state-full"><div class="state-icon">!</div><div class="state-title">Failed to load</div><div class="state-sub">${e.message}</div></div></td></tr>`;
      }
    }

    // ── BRAND + VIEW SWITCHING ──
    function setBrand(brand) {
      activeBrand = brand;
      selectedCases.clear();
      kbIndex = -1;

      document.getElementById('brand-ec').classList.remove('active', 'active-blue');
      document.getElementById('brand-ng').classList.remove('active', 'active-blue');
      document.getElementById(`brand-${brand}`).classList.add(brand === 'ng' ? 'active-blue' : 'active');

      _rebuildViewChips(brand);
      activeView = brandViews[brand][0];
      loadLeadCounts();
      loadLeads();
    }

    function _rebuildViewChips(brand) {
      const viewLabelsShort = {
        ec_residential: 'Residential', ec_commercial: 'Commercial',
        ec_held: 'Held', ec_discarded: 'Discarded',
        ng_residential: 'Residential', ng_commercial: 'Commercial',
        ng_spanish_residential: 'Spanish Res', ng_spanish_commercial: 'Spanish Com',
        ng_held: 'Held', ng_discarded: 'Discarded',
      };
      // Remove all existing view chips
      document.querySelectorAll('[id^="view-"]').forEach(el => el.remove());

      // Insert new chips before the second toolbar-sep (the one before Filter label)
      const seps = document.querySelectorAll('.toolbar .toolbar-sep');
      const insertBefore = seps[1]; // second separator = between View chips and Filter
      brandViews[brand].forEach((viewKey, i) => {
        const btn = document.createElement('button');
        btn.className = 'chip' + (i === 0 ? ' active' : '');
        btn.id = `view-${viewKey}`;
        btn.textContent = viewLabelsShort[viewKey];
        btn.onclick = () => setView(viewKey);
        insertBefore.parentNode.insertBefore(btn, insertBefore);
      });
    }

    // ── FILTERS + SORT ──
    function setView(name) {
      activeView = name;
      selectedCases.clear();
      kbIndex = -1;
      document.querySelectorAll('[id^="view-"]').forEach(el => {
        el.classList.remove('active', 'active-green', 'active-red', 'active-blue');
      });
      const isDiscard = name.endsWith('_discarded');
      const isCommercial = name.endsWith('_commercial');
      const isSpanish = name.includes('spanish');
      const cls = isDiscard ? 'active-red' : isCommercial ? 'active-green' : isSpanish ? 'active-blue' : 'active';
      document.getElementById(`view-${name}`).classList.add(cls);
      loadLeads();
    }

    function toggleChip(name) {
      chips[name] = !chips[name];
      const el = document.getElementById(`chip-${name}`);
      const activeClass = name === 'overdue' ? 'active-red' : (name === 'phone' || name === 'dnc') ? 'active-green' : 'active';
      el.classList.toggle(activeClass, chips[name]);
      applyFilters();
    }

    function setSort(key) {
      if (sortKey === key) {
        sortDir *= -1;
      } else {
        sortKey = key;
        sortDir = 1;
      }
      document.querySelectorAll('thead th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
      const thId = key === 'court_date' ? 'th-court' : 'th-filing';
      document.getElementById(thId).classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('filter-input').value.toLowerCase().trim();
      const today = new Date(); today.setHours(0, 0, 0, 0);

      let leads = allLeads.filter(l => {
        if (q && !([l.case_number, l.tenant_name, l.landlord_name, l.property_address].join(' ').toLowerCase().includes(q))) return false;
        if (chips.phone && !(l.phone && l.phone !== 'None')) return false;
        if (chips.dnc && l.dnc_status !== 'clear') return false;
        if (chips.residential && l.property_type !== 'residential') return false;
        if (chips.commercial && l.property_type !== 'commercial') return false;
        if (chips.overdue && !(l.court_date && new Date(l.court_date + 'T00:00:00') < today)) return false;
        return true;
      });

      if (sortKey) {
        leads = [...leads].sort((a, b) => {
          const av = a[sortKey] || '';
          const bv = b[sortKey] || '';
          return av < bv ? -sortDir : av > bv ? sortDir : 0;
        });
      }

      visibleLeads = leads;
      kbIndex = -1;
      renderLeads(leads);
      updateBulkBar();
      syncSelectAll();
    }

    // ── RENDER ──
    function renderLeads(leads) {
      const tbody = document.getElementById('leads-body');
      document.getElementById('queue-count').innerHTML = `<strong>${leads.length}</strong> ${esc(viewLabels[activeView] || 'Leads')}`;

      if (!leads.length) {
        tbody.innerHTML = `<tr><td colspan="11"><div class="state-full">
        <div class="state-icon">OK</div>
        <div class="state-title">No Records</div>
        <div class="state-sub">No pending leads match the current filters.</div>
      </div></td></tr>`;
        return;
      }

      const today = new Date(); today.setHours(0, 0, 0, 0);

      tbody.innerHTML = leads.map((lead, i) => {
        const hasPhone = lead.phone && lead.phone !== 'None';
        const phone = hasPhone ? formatPhone(lead.phone) : '—';
        const dncStatus = lead.dnc_status || 'unknown';
        const dncClear = dncStatus === 'clear';
        const canManualClearDnc = hasPhone && !dncClear && dncStatus !== 'blocked' && activeView !== 'discarded';
        const type = lead.property_type || lead.lead_bucket || 'unknown';
        const language = lead.language_hint === 'spanish_likely' ? 'Spanish-Likely' : '';
        const reason = lead.discard_reason || lead.qualification_notes || lead.lead_bucket || '';
        const courtDate = lead.court_date ? formatDate(lead.court_date) : '—';
        const filedDate = lead.filing_date ? formatDate(lead.filing_date) : '—';
        const isOverdue = lead.court_date && new Date(lead.court_date + 'T00:00:00') < today;
        const checked = selectedCases.has(lead.case_number) ? 'checked' : '';
        const selClass = selectedCases.has(lead.case_number) ? ' selected' : '';

        return `<tr data-case="${esc(lead.case_number)}" data-idx="${i}" class="${selClass}">
        <td><input type="checkbox" class="row-check" ${checked} onchange="toggleRow('${esc(lead.case_number)}', this.checked)"></td>
        <td class="td-case">${esc(lead.case_number)}</td>
        <td>
          <div class="td-name">${esc(lead.tenant_name || '—')}</div>
          <div class="td-sub">${esc(lead.county || '')}, ${esc(lead.state || '')}${language ? ' - ' + esc(language) : ''}</div>
        </td>
        <td>
          <div class="td-name">${esc(lead.landlord_name || '—')}</div>
        </td>
        <td class="td-address">${esc(lead.property_address || '—')}
          <div class="td-sub">${esc(lead.property_zip || '')}${lead.property_zip ? ' - ' : ''}${esc(reason)}</div>
        </td>
        <td class="td-phone ${hasPhone ? 'has-phone' : 'no-phone'}">${phone}</td>
        <td><span class="badge badge-${dncClear ? 'residential' : dncStatus === 'blocked' ? 'blocked' : 'unknown'}">${esc(dncStatus)}</span></td>
        <td><span class="badge badge-${type}">${type}</span></td>
        <td class="td-date ${isOverdue ? 'overdue' : ''}">${courtDate}</td>
        <td class="td-date">${filedDate}</td>
        <td>
          <div class="actions" id="actions-${esc(lead.case_number)}">
            ${activeView === 'discarded'
            ? `<span class="action-status skipped">NO CALL</span>`
            : hasPhone && dncClear
              ? `<button class="btn-approve" onclick="approve('${esc(lead.case_number)}')">APPROVE</button>`
              : canManualClearDnc
                ? `<button class="btn-dnc" onclick="clearDnc('${esc(lead.case_number)}')">DNC CLEAR</button>`
                : `<span class="action-status skipped">${!hasPhone ? 'NO PHONE' : dncStatus === 'blocked' ? 'DNC BLOCKED' : 'DNC REVIEW'}</span>`
          }
            ${activeView === 'discarded'
            ? ''
            : `<button class="btn-skip" onclick="skip('${esc(lead.case_number)}')">SKIP</button>`
          }
          </div>
        </td>
      </tr>`;
      }).join('');
    }

    // ── SELECTION ──
    function toggleRow(caseNumber, checked) {
      if (checked) selectedCases.add(caseNumber);
      else selectedCases.delete(caseNumber);
      const row = document.querySelector(`tr[data-case="${CSS.escape(caseNumber)}"]`);
      if (row) row.classList.toggle('selected', checked);
      updateBulkBar();
      syncSelectAll();
    }

    function toggleAll(checked) {
      visibleLeads.forEach(l => {
        if (checked) selectedCases.add(l.case_number);
        else selectedCases.delete(l.case_number);
      });
      document.querySelectorAll('tbody .row-check').forEach((cb, i) => {
        cb.checked = checked;
        cb.closest('tr').classList.toggle('selected', checked);
      });
      updateBulkBar();
    }

    function clearSelection() {
      selectedCases.clear();
      document.querySelectorAll('tbody .row-check').forEach(cb => { cb.checked = false; cb.closest('tr').classList.remove('selected'); });
      document.getElementById('check-all').checked = false;
      updateBulkBar();
    }

    function syncSelectAll() {
      const visible = visibleLeads.length;
      const selVisible = visibleLeads.filter(l => selectedCases.has(l.case_number)).length;
      const ca = document.getElementById('check-all');
      ca.checked = visible > 0 && selVisible === visible;
      ca.indeterminate = selVisible > 0 && selVisible < visible;
    }

    function updateBulkBar() {
      const n = selectedCases.size;
      const bar = document.getElementById('bulk-bar');
      bar.classList.toggle('visible', n > 0);
      document.getElementById('bulk-count').textContent = `${n} selected`;
      // disable approve if any selected lack a phone or are not DNC clear
      const anyNotCallable = [...selectedCases].some(cn => {
        const lead = allLeads.find(l => l.case_number === cn);
        return !lead || !lead.phone || lead.phone === 'None' || lead.dnc_status !== 'clear';
      });
      document.getElementById('btn-bulk-approve').disabled = anyNotCallable;
      if (anyNotCallable) document.getElementById('btn-bulk-approve').title = 'Some selected leads are missing phone or DNC clearance';
      else document.getElementById('btn-bulk-approve').title = '';
    }

    // ── BULK ACTIONS ──
    async function bulkApprove() {
      const cases = [...selectedCases];
      toast(`Approving ${cases.length} leads…`);
      document.getElementById('btn-bulk-approve').disabled = true;
      let ok = 0, fail = 0;
      await Promise.all(cases.map(async cn => {
        try {
          const res = await fetch(`/api/leads/${encodeURIComponent(cn)}/approve?track=ec`, { method: 'POST' });
          if (!res.ok) throw new Error();
          removeLeadFromState(cn);
          ok++;
        } catch { fail++; }
      }));
      selectedCases.clear();
      applyFilters();
      document.getElementById('m-pending').textContent = allLeads.length;
      if (ok) toast(`${ok} call${ok > 1 ? 's' : ''} dispatched`, 'success');
      if (fail) toast(`${fail} failed`, 'error');
    }

    async function bulkSkip() {
      const cases = [...selectedCases];
      await Promise.all(cases.map(async cn => {
        try {
          await fetch(`/api/leads/${encodeURIComponent(cn)}/skip?track=ec`, { method: 'POST' });
          removeLeadFromState(cn);
        } catch { }
      }));
      selectedCases.clear();
      applyFilters();
      document.getElementById('m-pending').textContent = allLeads.length;
      toast(`${cases.length} leads skipped`);
    }

    function removeLeadFromState(caseNumber) {
      allLeads = allLeads.filter(l => l.case_number !== caseNumber);
      selectedCases.delete(caseNumber);
    }

    // ── SINGLE ACTIONS ──
    async function approve(caseNumber) {
      const el = document.getElementById(`actions-${caseNumber}`);
      setActionsLoading(el);
      try {
        const res = await fetch(`/api/leads/${encodeURIComponent(caseNumber)}/approve?track=ec`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed');
        el.innerHTML = `<span class="action-status triggered">✓ TRIGGERED</span>`;
        removeLeadFromState(caseNumber);
        document.getElementById('m-pending').textContent = allLeads.length;
        document.getElementById('queue-count').innerHTML = `<strong>${visibleLeads.filter(l => l.case_number !== caseNumber).length}</strong> leads`;
        toast(`Call dispatched — ${caseNumber}`, 'success');
      } catch (e) {
        el.innerHTML = `<span class="action-status error">✗ ERROR</span>`;
        toast(`Approve failed: ${e.message}`, 'error');
      }
    }

    async function clearDnc(caseNumber) {
      const el = document.getElementById(`actions-${caseNumber}`);
      setActionsLoading(el);
      const notes = window.prompt('DNC clear reason/source?', 'manual_scrub');
      if (!notes) {
        loadLeads();
        return;
      }
      try {
        const res = await fetch(`/api/leads/${encodeURIComponent(caseNumber)}/dnc-clear?track=ec`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ source: notes.trim(), notes: notes.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed');
        const lead = allLeads.find(l => l.case_number === caseNumber);
        if (lead) {
          lead.dnc_status = 'clear';
          lead.dnc_source = `manual_override:${data.source}`;
        }
        applyFilters();
        toast(`DNC marked clear — ${caseNumber}`, 'success');
      } catch (e) {
        toast(`DNC clear failed: ${e.message}`, 'error');
        loadLeads();
      }
    }

    async function skip(caseNumber) {
      const el = document.getElementById(`actions-${caseNumber}`);
      setActionsLoading(el);
      try {
        await fetch(`/api/leads/${encodeURIComponent(caseNumber)}/skip?track=ec`, { method: 'POST' });
        el.innerHTML = `<span class="action-status skipped">SKIPPED</span>`;
        removeLeadFromState(caseNumber);
        document.getElementById('m-pending').textContent = allLeads.length;
        document.getElementById('queue-count').innerHTML = `<strong>${visibleLeads.filter(l => l.case_number !== caseNumber).length}</strong> leads`;
      } catch (e) {
        toast(`Skip failed: ${e.message}`, 'error');
        loadLeads();
      }
    }

    function setActionsLoading(el) {
      el.querySelectorAll('button').forEach(b => b.disabled = true);
    }

    // ── KEYBOARD NAVIGATION ──
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      const rows = document.querySelectorAll('tbody tr[data-idx]');
      if (!rows.length) return;

      if (e.key === 'j' || e.key === 'ArrowDown') {
        e.preventDefault();
        kbIndex = Math.min(kbIndex + 1, rows.length - 1);
        setKbFocus(rows, kbIndex);
      } else if (e.key === 'k' || e.key === 'ArrowUp') {
        e.preventDefault();
        kbIndex = Math.max(kbIndex - 1, 0);
        setKbFocus(rows, kbIndex);
      } else if (e.key === 'a' && kbIndex >= 0) {
        const caseNumber = rows[kbIndex].dataset.case;
        const btn = document.querySelector(`#actions-${CSS.escape(caseNumber)} .btn-approve`);
        if (btn && !btn.disabled) approve(caseNumber);
      } else if (e.key === 's' && kbIndex >= 0) {
        const caseNumber = rows[kbIndex].dataset.case;
        skip(caseNumber);
      } else if (e.key === ' ' && kbIndex >= 0) {
        e.preventDefault();
        const caseNumber = rows[kbIndex].dataset.case;
        const newState = !selectedCases.has(caseNumber);
        toggleRow(caseNumber, newState);
        const cb = rows[kbIndex].querySelector('.row-check');
        if (cb) cb.checked = newState;
      }
    });

    function setKbFocus(rows, idx) {
      rows.forEach(r => r.classList.remove('kb-focus'));
      rows[idx].classList.add('kb-focus');
      rows[idx].scrollIntoView({ block: 'nearest' });
    }

    // ── TOAST ──
    function toast(msg, type = '') {
      const wrap = document.getElementById('toast-wrap');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    // ── UTILS ──
    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatPhone(p) {
      const d = String(p).replace(/\D/g, '');
      if (d.length === 10) return `(${d.slice(0, 3)}) ${d.slice(3, 6)}-${d.slice(6)}`;
      if (d.length === 11 && d[0] === '1') return `+1 (${d.slice(1, 4)}) ${d.slice(4, 7)}-${d.slice(7)}`;
      return p;
    }

    function formatDate(s) {
      const d = new Date(s + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── INIT ──
    loadAll();
  </script>
</body>

</html>
