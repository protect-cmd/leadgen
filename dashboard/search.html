<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Search · Leadgen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0d1117;
      --bg-elev: #161b22;
      --bg-row-hover: rgba(255,255,255,0.04);
      --bg-row-active: rgba(80,160,255,0.15);
      --border: rgba(255,255,255,0.08);
      --text: #e6edf3;
      --text-dim: rgba(230,237,243,0.6);
      --text-dimmer: rgba(230,237,243,0.4);
      --accent: #6cb0ff;
      --green: #6ee7b7;
      --orange: #ffb066;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
    }
    header .brand { font-weight: 700; }
    header .title { color: var(--text-dim); }
    header .spacer { flex: 1; }
    header a { color: var(--text-dim); text-decoration: none; font-size: 13px; }
    header a:hover { color: var(--text); }

    .search-bar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    #search-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
    }
    #search-input:focus { border-color: var(--accent); }

    .main {
      display: flex;
      height: calc(100vh - 110px);
    }
    .results {
      flex: 1.4;
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }
    .meta {
      padding: 10px 20px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-dimmer);
    }
    .row {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }
    .row:hover { background: var(--bg-row-hover); }
    .row.active { background: var(--bg-row-active); }
    .row .name { font-weight: 600; font-size: 15px; }
    .row .addr { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .row .meta-line { font-size: 11px; color: var(--text-dimmer); margin-top: 4px; font-family: ui-monospace, monospace; }
    .row .right { text-align: right; }
    .row .phone { font-family: ui-monospace, monospace; font-size: 14px; }
    .row .loc { font-size: 11px; color: var(--text-dimmer); margin-top: 2px; }

    .detail {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .detail.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dimmer);
      font-size: 13px;
    }
    .detail h2 { margin: 0; font-size: 20px; }
    .detail .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .detail .phone-large {
      font-family: ui-monospace, monospace;
      font-size: 18px;
      margin-top: 16px;
      cursor: pointer;
      display: inline-block;
    }
    .detail .phone-large:hover { color: var(--accent); }
    .detail .addr-large { font-size: 14px; margin-top: 4px; }
    .detail .detail-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .detail .detail-head h2 { font-size: 18px; }
    .detail .track-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
    .detail .track-badge.ists { background: rgba(140,120,255,0.18); color: #c4b5fd; }
    .detail .track-badge.ng { background: rgba(108,176,255,0.16); color: var(--accent); }
    .detail .track-badge.cd { background: rgba(255,176,102,0.18); color: var(--orange); }
    .detail .track-badge.gp { background: rgba(110,231,183,0.18); color: var(--green); }
    .dcard { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .dcard td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; line-height: 1.4; }
    .dcard tr:last-child td { border-bottom: 0; }
    .dcard .dk { color: var(--text-dim); font-weight: 600; white-space: nowrap; width: 130px;
      background: var(--bg-elev); }
    .dcard .dv { color: var(--text); word-break: break-word; }
    .dcard .dv.mono { font-family: ui-monospace, monospace; }
    .dcard .dv.copyable { cursor: pointer; }
    .dcard .dv.copyable:hover { color: var(--accent); }
    .dcard .pill { font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 20px; }
    .dcard .pill.callable { background: rgba(110,231,183,0.15); color: var(--green); }
    .dcard .pill.dnc { background: rgba(255,120,120,0.16); color: #ff9a9a; }
    .copy-btn { margin-top: 12px; width: 100%; padding: 10px 14px; background: var(--accent); color: #08111f;
      border: none; border-radius: 7px; font-weight: 700; font-size: 13px; cursor: pointer; }
    .copy-btn:hover { filter: brightness(1.08); }
    .copy-btn.copied { background: var(--green); }
    .detail hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
    .detail .kv { display: flex; gap: 12px; font-size: 12px; margin: 4px 0; }
    .detail .kv .k { color: var(--text-dim); min-width: 90px; }
    .detail .actions { display: flex; gap: 8px; margin-top: 8px; }
    .detail .actions button {
      padding: 6px 12px;
      font-size: 12px;
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }
    .detail .actions button:hover { border-color: var(--accent); color: var(--accent); }
    .detail .actions button.skip { color: var(--orange); }
    .detail .note-form { margin-top: 12px; display: none; }
    .detail .note-form.open { display: block; }
    .detail .note-form textarea {
      width: 100%;
      min-height: 70px;
      padding: 8px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font: inherit;
      resize: vertical;
    }
    .detail .notes { margin-top: 20px; }
    .detail .note {
      padding: 8px 0;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    .detail .note .when { font-size: 11px; color: var(--text-dimmer); margin-top: 2px; }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <span class="brand">Leadgen</span>
    <span class="title">Search</span>
    <span class="spacer"></span>
    <a href="/queue">Queue ↗</a>
  </header>

  <div class="search-bar">
    <input id="search-input" type="text" autofocus
           placeholder="Search by name, phone, case #, or address…">
  </div>

  <div class="main">
    <div class="results" id="results">
      <div class="meta" id="results-meta">Type 2+ characters to search.</div>
    </div>
    <div class="detail empty" id="detail">
      <span>Click a result to see details</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const input = document.getElementById('search-input');
const resultsEl = document.getElementById('results');
const metaEl = document.getElementById('results-meta');
const detailEl = document.getElementById('detail');
const toastEl = document.getElementById('toast');

let abortController = null;
let activeRowIndex = -1;
let currentResults = [];
let selectedCase = null;

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 1500);
}

function fmtPhone(p) {
  if (!p) return '';
  const d = p.replace(/\D/g, '');
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  return p;
}

function renderResults(rows) {
  currentResults = rows;
  if (rows.length === 0) {
    metaEl.textContent = 'No matches.';
    // remove existing rows
    [...resultsEl.querySelectorAll('.row')].forEach(r => r.remove());
    return;
  }
  metaEl.textContent = `${rows.length} match${rows.length === 1 ? '' : 'es'}`;
  [...resultsEl.querySelectorAll('.row')].forEach(r => r.remove());
  rows.forEach((row, idx) => {
    const el = document.createElement('div');
    el.className = 'row';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div>
        <div class="name">${escapeHtml(row.tenant_name || row.contact_name || '(unknown)')}</div>
        <div class="addr">${escapeHtml(row.property_address || '—')}</div>
        <div class="meta-line">${escapeHtml(row.case_number || '')} · ${rowDateLabel(row)}</div>
      </div>
      <div class="right">
        <div class="phone">${fmtPhone(row.phone) || '—'}</div>
        <div class="loc">${escapeHtml((row.state || '') + '/' + (row.county || ''))}</div>
      </div>
    `;
    el.addEventListener('click', () => selectRow(idx));
    resultsEl.appendChild(el);
  });
  activeRowIndex = -1;
}

function rowDateLabel(row) {
  if (row.track === 'ists') return 'judgment ' + (row.judgment_date || '—');
  if (row.track === 'cd') return 'answer due ' + (row.answer_deadline || '—');
  if (row.track === 'gp') return 'exemption due ' + (row.exemption_deadline || '—');
  return 'court ' + (row.court_date || '—');
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function selectRow(idx) {
  if (idx < 0 || idx >= currentResults.length) return;
  activeRowIndex = idx;
  [...resultsEl.querySelectorAll('.row')].forEach((r, i) =>
    r.classList.toggle('active', i === idx)
  );
  renderDetail(currentResults[idx]);
}

function relativeTime(iso) {
  if (!iso) return 'never';
  const then = new Date(iso).getTime();
  const diff = Date.now() - then;
  if (diff < 60_000) return 'just now';
  if (diff < 3600_000) return `${Math.round(diff/60000)}m ago`;
  if (diff < 86_400_000) return `${Math.round(diff/3600000)}h ago`;
  return `${Math.round(diff/86400000)}d ago`;
}

// Track-aware field list for the detail card + the copy block. Empty values dropped.
function leadFields(row) {
  const isIsts = row.track === 'ists';
  const isCd = row.track === 'cd';
  const isGp = row.track === 'gp';
  const rentStr = row.estimated_rent ? '$' + Math.round(row.estimated_rent).toLocaleString() : '';
  const debtStr = row.debt_amount ? '$' + Math.round(row.debt_amount).toLocaleString() : '';
  const loc = (row.state || row.county) ? `${row.state || ''}/${row.county || ''}` : '';
  const f = [
    { k: 'Name', v: row.tenant_name || row.contact_name || '(unknown)' },
    { k: 'Phone', v: fmtPhone(row.phone) || '', mono: true, copy: row.phone || '' },
    { k: 'Address', v: row.property_address || '' },
    { k: 'Case', v: row.case_number || '', mono: true, copy: row.case_number || '' },
  ];
  if (isIsts) {
    f.push({ k: 'Judgment date', v: row.judgment_date || '' });
  } else if (isCd) {
    f.push({ k: 'Filed', v: row.filing_date || '' });
    f.push({ k: 'Answer deadline', v: row.answer_deadline || '' });
  } else if (isGp) {
    f.push({ k: 'Filed', v: row.filing_date || '' });
    f.push({ k: 'Exemption deadline', v: row.exemption_deadline || '' });
  } else {
    f.push({ k: 'Filed', v: row.filing_date || '' });
    f.push({ k: 'Court date', v: row.court_date || '' });
  }
  f.push({ k: 'County', v: loc });
  f.push({ k: isIsts ? 'Landlord/plaintiff' : (isCd || isGp) ? 'Creditor' : 'Landlord', v: row.landlord_name || '' });
  if (rentStr) f.push({ k: 'Rent est.', v: rentStr });
  if (debtStr) f.push({ k: 'Debt amount', v: debtStr });
  if (isGp && row.garnishment_type) f.push({ k: 'Garnishment type', v: row.garnishment_type });
  if (isGp && row.garnishee_name) f.push({ k: 'Garnishee', v: row.garnishee_name });
  if (row.dnc_status) f.push({ k: 'DNC', v: row.dnc_status, pill: row.dnc_status });
  return f.filter(x => x.v);
}

function leadCopyText(row) {
  return leadFields(row).map(x => `${x.k}: ${x.v}`).join('\n');
}

function renderCard(row) {
  const cells = leadFields(row).map(x => {
    let vCell;
    if (x.pill) {
      vCell = `<span class="pill ${x.pill === 'callable' ? 'callable' : 'dnc'}">${escapeHtml(x.v)}</span>`;
    } else if (x.copy) {
      vCell = `<span class="dv ${x.mono ? 'mono' : ''} copyable" data-copy="${escapeHtml(String(x.copy))}" title="click to copy">${escapeHtml(x.v)}</span>`;
    } else {
      vCell = `<span class="dv ${x.mono ? 'mono' : ''}">${escapeHtml(x.v)}</span>`;
    }
    return `<tr><td class="dk">${escapeHtml(x.k)}</td><td>${vCell}</td></tr>`;
  }).join('');
  return `<table class="dcard">${cells}</table>`;
}

async function renderDetail(row) {
  selectedCase = { case_number: row.case_number, track: row.track || 'ng' };
  detailEl.classList.remove('empty');
  const stage = row.bland_status || row.lead_bucket || '—';
  const lastCalled = relativeTime(row.last_called_at);
  const badgeClass = { ists: 'ists', cd: 'cd', gp: 'gp' }[row.track] || 'ng';
  const badgeLabel = { ists: 'ISTS · judgment', cd: 'Cosner Drake · debt claim', gp: 'Garnish Proof · garnishment' }[row.track] || 'Vantage';
  detailEl.innerHTML = `
    <div class="detail-head">
      <h2>${escapeHtml(row.tenant_name || row.contact_name || '(unknown)')}</h2>
      <span class="track-badge ${badgeClass}">${badgeLabel}</span>
    </div>
    ${renderCard(row)}
    <button id="btn-copy" class="copy-btn">Copy details</button>
    <hr>
    <div class="kv"><span class="k">Stage</span><span>${escapeHtml(String(stage))}</span></div>
    <div class="kv"><span class="k">Last called</span><span id="last-called">${lastCalled}</span></div>
    <div class="actions">
      <button id="btn-call">Mark Called</button>
      <button id="btn-note">Add Note</button>
      <button id="btn-skip" class="skip">Skip</button>
    </div>
    <div class="note-form" id="note-form">
      <textarea id="note-text" placeholder="Note (Cmd/Ctrl+Enter to save)"></textarea>
      <div style="margin-top:6px"><button id="btn-save-note">Save</button></div>
    </div>
    <div class="notes" id="notes"><div class="meta">Notes</div></div>
  `;

  document.getElementById('btn-copy').addEventListener('click', () => {
    navigator.clipboard.writeText(leadCopyText(row)).then(() => {
      const b = document.getElementById('btn-copy');
      b.textContent = '✓ Copied'; b.classList.add('copied');
      showToast('Details copied');
      setTimeout(() => { b.textContent = 'Copy details'; b.classList.remove('copied'); }, 1500);
    });
  });
  detailEl.querySelectorAll('.dv.copyable').forEach(el => {
    el.addEventListener('click', () => {
      navigator.clipboard.writeText(el.dataset.copy).then(() => showToast('Copied'));
    });
  });
  document.getElementById('btn-call').addEventListener('click', markCalled);
  document.getElementById('btn-note').addEventListener('click', () => {
    document.getElementById('note-form').classList.toggle('open');
    document.getElementById('note-text').focus();
  });
  document.getElementById('btn-save-note').addEventListener('click', saveNote);
  document.getElementById('btn-skip').addEventListener('click', skipLead);
  document.getElementById('note-text').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') saveNote();
  });

  loadNotes();
}

async function markCalled() {
  if (!selectedCase) return;
  const r = await fetch(`/api/leads/${encodeURIComponent(selectedCase.case_number)}/mark-called?track=${selectedCase.track}`, { method: 'POST' });
  if (r.ok) {
    const body = await r.json();
    document.getElementById('last-called').textContent = relativeTime(body.last_called_at);
    showToast('Marked called');
  } else {
    showToast('Failed to mark called');
  }
}

async function saveNote() {
  if (!selectedCase) return;
  const ta = document.getElementById('note-text');
  const text = (ta.value || '').trim();
  if (!text) return;
  const r = await fetch(`/api/leads/${encodeURIComponent(selectedCase.case_number)}/note?track=${selectedCase.track}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  });
  if (r.ok) {
    ta.value = '';
    document.getElementById('note-form').classList.remove('open');
    showToast('Note saved');
    loadNotes();
  } else {
    showToast('Save failed');
  }
}

async function skipLead() {
  if (!selectedCase) return;
  if (!confirm('Skip this lead? This is irreversible.')) return;
  const r = await fetch(`/api/leads/${encodeURIComponent(selectedCase.case_number)}/skip?track=${selectedCase.track}`, { method: 'POST' });
  if (r.ok) {
    showToast('Skipped');
    detailEl.className = 'detail empty';
    detailEl.innerHTML = '<span>Click a result to see details</span>';
  } else {
    showToast('Skip failed');
  }
}

async function loadNotes() {
  if (!selectedCase) return;
  const r = await fetch(`/api/leads/${encodeURIComponent(selectedCase.case_number)}/notes?track=${selectedCase.track}`);
  if (!r.ok) return;
  const notes = await r.json();
  const wrap = document.getElementById('notes');
  if (!wrap) return;
  wrap.innerHTML = `<div class="meta">Notes (${notes.length})</div>` +
    notes.map(n => `
      <div class="note">${escapeHtml(n.note_text)}
        <div class="when">${relativeTime(n.created_at)} · ${escapeHtml(n.author)}</div>
      </div>
    `).join('');
}

let typingTimer;
input.addEventListener('input', () => {
  clearTimeout(typingTimer);
  typingTimer = setTimeout(runSearch, 250);
});
input.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') { e.preventDefault(); selectRow(Math.min(activeRowIndex + 1, currentResults.length - 1)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); selectRow(Math.max(activeRowIndex - 1, 0)); }
  else if (e.key === 'Enter' && activeRowIndex < 0 && currentResults.length > 0) {
    selectRow(0);
  } else if (e.key === 'Escape') {
    detailEl.className = 'detail empty';
    detailEl.innerHTML = '<span>Click a result to see details</span>';
    selectedCase = null;
  }
});
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    input.focus();
    input.select();
  }
});

async function runSearch() {
  const q = input.value.trim();
  if (q.length < 2) {
    metaEl.textContent = 'Type 2+ characters to search.';
    [...resultsEl.querySelectorAll('.row')].forEach(r => r.remove());
    return;
  }
  if (abortController) abortController.abort();
  abortController = new AbortController();
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`, { signal: abortController.signal });
    if (!r.ok) { metaEl.textContent = 'Search error.'; return; }
    const rows = await r.json();
    renderResults(rows);
  } catch (e) {
    if (e.name !== 'AbortError') metaEl.textContent = 'Search error.';
  }
}
</script>
</body>
</html>
